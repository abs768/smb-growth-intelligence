name: pages

# Runs the platform end-to-end on a clean runner, then publishes a dashboard
# rendered from whatever reports/*.json that run produced. The published page
# is therefore evidence of a real execution, not a committed snapshot: if the
# pipeline breaks or a critical data-quality assertion fails, the build fails
# and the site is not updated.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the platform end-to-end
        run: make all PY=python

      - name: Build the dashboard from the run's reports
        run: python docs/build.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
